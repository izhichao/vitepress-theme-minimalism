。那些简单而平静的时光，正\"},{\"title\":\"6.运动的乐趣（文章 7 为草稿，无法访问）\",\"datetime\":\"2023-10-06 10:00:00\",\"permalink\":\"/posts/6\",\"outline\":\"deep\",\"category\":\"子文章\",\"tags\":[\"运动的乐趣\"],\"excerpt\":\"运动是一种解压的方式。每当我感到疲惫时，我都会选择去健身房锻炼。跑步机上的每一步，似乎都能将我的烦恼抛在脑后，心中充满了畅快的感觉。锻炼不仅让我保持身体健康，也让我在挥汗如雨中找到了快乐。和朋友一起去打篮球的时光，更是让我感受到团队合作的力量。在运动中，我结识了许多志同道合的伙伴，分享着彼此的目标与\"},{\"title\":\"5.观察日常\",\"datetime\":\"2023-10-05 10:00:00\",\"permalink\":\"/posts/5\",\"outline\":\"deep\",\"category\":\"文章\",\"tags\":[\"观察日常\"],\"excerpt\":\"在日常生活中，观察周围的细节总能让我有所收获。今天，我在地铁上看到一个小女孩对窗外的景物充满好奇，眼神中闪烁着纯真的光芒。她指着窗外的建筑，兴奋地和妈妈交流，那种纯粹的快乐感染了我。这让我意识到，生活中的美好往往藏在那些看似平常的瞬间里。用心去观察，每一天都有新发现，仿佛打开了一扇窗，让我看到了不一\"},{\"title\":\"4.一次难忘的午餐\",\"datetime\":\"2023-10-04 10:00:00\",\"permalink\":\"/posts/4\",\"outline\":\"deep\",\"category\":\"文章\",\"tags\":[\"一次难忘的午餐\"],\"excerpt\":\"昨天，我和朋友一起去了一家新开的餐厅。食物色香味俱全，特别是那道招牌菜，令人垂涎欲滴。我们一边享受美食，一边聊着生活中的琐事，时光在欢声笑语中悄然流逝。餐厅的环境舒适，装饰别致，让我们放松了心情。每一次的聚餐都是一次美好的体验，让我感受到朋友之间的温暖。这次午餐不仅让我们的味蕾得到了满足，也加深了彼\"},{\"title\":\"3.阅读的乐趣\",\"datetime\":\"2023-10-03 10:00:00\",\"permalink\":\"/posts/3\",\"outline\":\"deep\",\"category\":\"文章\",\"tags\":[\"阅读的乐趣\"],\"excerpt\":\"阅读是一种奇妙的体验。翻开一本书，就像打开了一个新的世界。我最近在读一本关于人类历史的书，书中的故事让我对过去有了更深的理解。作者用生动的语言描绘了历史事件和人物，使我仿佛亲身经历了那些时刻。无论是小说还是非小说，阅读总能让我在想象中飞翔，心灵得到滋养。书籍是我最忠实的朋友，伴我度过无数个孤独的夜晚\"}],\"page\":{\"max\":5},\"transition\":true,\"logo\":\"/profile.png\",\"outline\":{\"level\":2},\"nav\":[{\"text\":\"首页\",\"link\":\"/\"},{\"text\":\"文章\",\"link\":\"/page-1\"},{\"text\":\"分类\",\"link\":\"/category\"},{\"text\":\"归档\",\"link\":\"/archives\"},{\"text\":\"文档\",\"link\":\"/docs/doc1\"}],\"sidebar\":{\"/docs\":[{\"text\":\"如何使用电饭煲\",\"items\":[{\"text\":\"选择合适的电饭煲\",\"link\":\"/docs/doc1\"},{\"text\":\"煮出松软米饭的技巧\",\"link\":\"/docs/doc2\"},{\"text\":\"电饭煲的多功能用途\",\"link\":\"/docs/doc3\"},{\"text\":\"电饭煲的清洁与保养\",\"link\":\"/docs/doc4\"},{\"text\":\"电饭煲常见问题处理\",\"link\":\"/docs/doc5\"}]}]},\"socialLinks\":[{\"icon\":\"github\",\"link\":\"https://github.com/izhichao/vitepress-theme
